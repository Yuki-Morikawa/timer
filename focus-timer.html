<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="集中タイマー">
<meta name="theme-color" content="#0d0d0d">
<title>集中タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #1c1c1c;
  --surface2: #262626;
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.2);
  --text: #f0ede8;
  --muted: rgba(240,237,232,0.5);
  --hint: rgba(240,237,232,0.28);
  --success: #5a9e7a;
  --danger: #c95555;
  --teal: #00bfa5;
  --font-num: 'DM Mono', monospace;
  --font-ui: 'Noto Sans JP', sans-serif;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font-ui); overflow: hidden;
  -webkit-tap-highlight-color: transparent; user-select: none;
}

#app {
  height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem 1.75rem 2rem; position: relative;
}
#app::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 100%, var(--glow, transparent), transparent);
  pointer-events: none; z-index: 0; transition: opacity 1s;
}
#app.warn  { --glow: rgba(212,149,74,0.14); }
#app.danger { --glow: rgba(201,85,85,0.18); }
#app.done-phase { --glow: rgba(90,158,122,0.18); }

.screen { position: relative; z-index: 1; width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; }
.screen.hidden { display: none; }

/* ══ SETUP ══ */
.setup-hint {
  font-size: 17px; letter-spacing: 0.14em; color: var(--hint);
  text-transform: uppercase; margin-bottom: 1.6rem;
}

.task-input-wrap { width: 100%; margin-bottom: 0.75rem; }
.task-input-wrap input {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border2);
  border-radius: 14px; color: var(--text); font-family: var(--font-ui);
  font-size: 17px; padding: 15px 18px; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s;
}
.task-input-wrap input::placeholder { color: var(--hint); }
.task-input-wrap input:focus { border-color: rgba(240,237,232,0.4); }

.quick-tasks { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-bottom: 0.5rem; }
.qtask {
  background: transparent; border: 0.5px solid var(--border); border-radius: 99px;
  color: var(--muted); font-family: var(--font-ui); font-size: 14px;
  padding: 7px 15px; cursor: pointer; transition: all 0.15s;
}
.qtask:active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.qtask-header { display: flex; align-items: center; width: 100%; margin-bottom: 0.9rem; }
.qtask-header span { font-size: 12px; color: var(--hint); flex: 1; letter-spacing: 0.08em; }
.qtask-edit-btn {
  font-size: 12px; color: var(--hint); background: none; border: none;
  cursor: pointer; padding: 2px 6px; font-family: var(--font-ui);
  text-decoration: underline; text-underline-offset: 3px;
}
.qtask-editor { width: 100%; margin-bottom: 0.9rem; display: none; }
.qtask-editor.open { display: block; }
.qtask-editor textarea {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border2);
  border-radius: 10px; color: var(--text); font-family: var(--font-ui);
  font-size: 14px; padding: 12px 15px; outline: none; resize: none; line-height: 1.8;
}
.qtask-editor-hint { font-size: 12px; color: var(--hint); margin-top: 6px; line-height: 1.6; }
.qtask-save-btn {
  margin-top: 9px; padding: 9px 20px; background: var(--surface2);
  border: 0.5px solid var(--border2); border-radius: 9px;
  color: var(--text); font-family: var(--font-ui); font-size: 14px; cursor: pointer;
}

.time-row { display: flex; align-items: flex-end; gap: 4px; margin-bottom: 1rem; }
.unit-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.unit-wrap span { font-size: 12px; letter-spacing: 0.08em; color: var(--hint); text-transform: uppercase; }
.unit-wrap input {
  width: 76px; height: 76px; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-family: var(--font-num);
  font-size: 34px; font-weight: 400; text-align: center;
  -webkit-appearance: none; -moz-appearance: textfield; outline: none;
  transition: border-color 0.2s;
}
.unit-wrap input:focus { border-color: rgba(240,237,232,0.4); }
.unit-wrap input::-webkit-inner-spin-button,
.unit-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
.colon { font-family: var(--font-num); font-size: 28px; color: var(--hint); padding-bottom: 14px; }

.presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 0.9rem; }
.preset {
  background: transparent; border: 0.5px solid var(--border); border-radius: 99px;
  color: var(--muted); font-family: var(--font-ui); font-size: 14px;
  padding: 8px 16px; cursor: pointer; transition: all 0.15s;
}
.preset:active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.setting-row {
  display: flex; align-items: center; gap: 12px; width: 100%;
  margin-bottom: 0.6rem; padding: 13px 17px;
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 13px;
}
.setting-row label { font-size: 14px; color: var(--muted); flex: 1; }
.setting-row select {
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 9px; color: var(--text); font-family: var(--font-ui);
  font-size: 14px; padding: 7px 12px; outline: none; -webkit-appearance: none;
}
.tog-group { display: flex; gap: 7px; }
.tog {
  padding: 6px 14px; font-size: 13px; font-family: var(--font-ui);
  border: 0.5px solid var(--border); border-radius: 99px;
  background: transparent; color: var(--hint); cursor: pointer; transition: all 0.15s;
}
.tog.on { background: var(--surface2); color: var(--text); border-color: var(--border2); }

/* 自動ロック案内 */
.sleep-notice {
  width: 100%; padding: 11px 15px; margin-bottom: 0.6rem;
  background: rgba(0,191,165,0.08); border: 0.5px solid rgba(0,191,165,0.25);
  border-radius: 12px;
}
.sleep-notice p { font-size: 12px; color: rgba(0,191,165,0.9); line-height: 1.7; }
.sleep-notice strong { font-weight: 500; }

.start-btn {
  width: 100%; padding: 18px; background: var(--text); color: var(--bg);
  border: none; border-radius: 15px; font-family: var(--font-ui);
  font-size: 17px; font-weight: 500; cursor: pointer; margin-top: 0.8rem;
  letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s;
}
.start-btn:active { transform: scale(0.98); opacity: 0.9; }

/* ══ TIMER ══ */
.task-display {
  font-size: 26px; color: var(--muted); letter-spacing: 0.03em;
  margin-bottom: 1.2rem; text-align: center; max-width: 300px;
  line-height: 1.5; min-height: 22px;
}
.phase-label {
  font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--hint); margin-bottom: 1.2rem; min-height: 18px; transition: color 0.5s;
}
.ring-container { position: relative; width: 240px; height: 240px; margin-bottom: 1.2rem; }
#ring-svg { transform: rotate(-90deg); overflow: visible; }
#ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 4; }
#ring-fill {
  fill: none; stroke: var(--text); stroke-width: 4; stroke-linecap: round;
  stroke-dasharray: 691; stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.9s linear, stroke 0.5s;
}
.ring-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
#display-time {
  font-family: var(--font-num); font-size: 56px; font-weight: 300;
  letter-spacing: -3px; color: var(--text); transition: color 0.5s; line-height: 1;
}
#overtime-label {
  font-size: 14px; font-family: var(--font-num); color: var(--danger); min-height: 18px;
}

.interval-dots { display: flex; gap: 7px; margin-bottom: 1.2rem; min-height: 10px; }
.idot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: background 0.3s; }
.idot.passed { background: rgba(255,255,255,0.5); }
.idot.current { background: var(--text); }

.controls { display: flex; gap: 12px; width: 100%; margin-bottom: 1.2rem; }
.ctrl {
  flex: 1; padding: 16px; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-family: var(--font-ui);
  font-size: 16px; cursor: pointer; transition: background 0.15s, transform 0.1s;
}
.ctrl:active { transform: scale(0.97); background: var(--surface2); }
.ctrl.stop { color: var(--muted); }

.vis-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--hint); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); flex-shrink: 0; transition: background 0.3s; }
.dot.off { background: var(--danger); }

/* ══ DONE ══ */
.done-icon { font-size: 58px; margin-bottom: 1rem; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
@keyframes pop { 0%{transform:scale(0) rotate(-15deg);opacity:0} 100%{transform:scale(1);opacity:1} }
.done-stars { display: flex; gap: 12px; margin-bottom: 1.2rem; }
.done-stars svg { animation: star-in 0.35s cubic-bezier(0.175,0.885,0.32,1.275) both; }
.done-stars svg:nth-child(2) { animation-delay: 0.12s; }
.done-stars svg:nth-child(3) { animation-delay: 0.24s; }
@keyframes star-in { 0%{transform:scale(0) rotate(-20deg);opacity:0} 100%{transform:scale(1);opacity:1} }
.done-title { font-size: 22px; font-weight: 500; margin-bottom: 0.4rem; }
.done-task { font-size: 15px; color: var(--muted); margin-bottom: 0.4rem; text-align: center; }
.done-sub { font-size: 14px; color: var(--hint); margin-bottom: 0.3rem; text-align: center; line-height: 1.7; }
.done-elapsed { font-family: var(--font-num); font-size: 13px; color: var(--hint); margin-bottom: 2rem; }
.done-btns { display: flex; gap: 12px; width: 100%; }
.btn-again {
  flex: 2; padding: 16px; background: var(--text); color: var(--bg); border: none;
  border-radius: 13px; font-family: var(--font-ui); font-size: 16px; font-weight: 500; cursor: pointer;
}
.btn-again:active { opacity: 0.9; transform: scale(0.97); }
.btn-change {
  flex: 1; padding: 16px; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 13px; color: var(--muted); font-family: var(--font-ui); font-size: 16px; cursor: pointer;
}
.btn-change:active { background: var(--surface2); }

/* ══ インターバル チカチカ ══ */
#chika {
  position: fixed; inset: 0; z-index: 500;
  opacity: 0; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: background 0.15s, opacity 0.2s;
}
#chika.active { opacity: 1; pointer-events: auto; }
#chika .chika-elapsed {
  font-family: var(--font-num); font-size: 80px; font-weight: 300;
  letter-spacing: -4px; line-height: 1; margin-bottom: 0.4rem;
  transition: color 0.15s;
}
#chika .chika-label {
  font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 0.5rem; transition: color 0.15s;
}
#chika .chika-task {
  font-size: 15px; margin-bottom: 2.5rem; text-align: center;
  max-width: 260px; line-height: 1.6; transition: color 0.15s;
}
#chika .chika-dismiss {
  padding: 15px 50px; border: none; border-radius: 13px;
  font-family: var(--font-ui); font-size: 16px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
#chika .chika-countdown {
  font-size: 13px; margin-top: 12px; letter-spacing: 0.04em;
  transition: color 0.15s;
}

#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<!-- インターバル チカチカ画面 -->
<div id="chika">
  <div class="chika-elapsed" id="chika-elapsed">10分</div>
  <div class="chika-label">経過しました</div>
  <div class="chika-task" id="chika-task"></div>
  <button class="chika-dismiss" id="chika-dismiss" onclick="dismissChika()">OK、集中する</button>
  <div class="chika-countdown" id="chika-countdown">5秒後に閉じます</div>
</div>

<div id="app">

  <!-- SETUP -->
  <div class="screen" id="setup">
    <div class="setup-hint">今日、何に集中する？</div>

    <div class="task-input-wrap">
      <input type="text" id="task-input" placeholder="タスク名を入力（任意）" maxlength="40">
    </div>
    <div class="quick-tasks" id="quick-tasks-row"></div>
    <div class="qtask-header">
      <span>よく使うタスク</span>
      <button class="qtask-edit-btn" onclick="toggleEditor()">編集</button>
    </div>
    <div class="qtask-editor" id="qtask-editor">
      <textarea id="qtask-textarea" rows="4" placeholder="1行に1タスク&#10;例：メール返信&#10;資料作成"></textarea>
      <div class="qtask-editor-hint">このデバイスだけに保存。他の人には見えません。</div>
      <button class="qtask-save-btn" onclick="saveQuickTasks()">保存</button>
    </div>

    <div class="time-row">
      <div class="unit-wrap"><span>時間</span><input type="number" id="inp-h" value="0" min="0" max="23"></div>
      <span class="colon">:</span>
      <div class="unit-wrap"><span>分</span><input type="number" id="inp-m" value="25" min="0" max="59"></div>
      <span class="colon">:</span>
      <div class="unit-wrap"><span>秒</span><input type="number" id="inp-s" value="0" min="0" max="59"></div>
    </div>

    <div class="presets">
      <button class="preset" onclick="setTime(0,5,0)">5分</button>
      <button class="preset" onclick="setTime(0,10,0)">10分</button>
      <button class="preset" onclick="setTime(0,25,0)">25分</button>
      <button class="preset" onclick="setTime(0,30,0)">30分</button>
      <button class="preset" onclick="setTime(0,45,0)">45分</button>
      <button class="preset" onclick="setTime(1,0,0)">1時間</button>
    </div>

    <div class="setting-row">
      <label>インターバル通知</label>
      <select id="interval-select">
        <option value="0">なし</option>
        <option value="300">5分ごと</option>
        <option value="600" selected>10分ごと</option>
        <option value="900">15分ごと</option>
      </select>
    </div>
    <div class="setting-row">
      <label>音</label>
      <div class="tog-group">
        <button class="tog" id="sound-on" onclick="setSoundPref(true)">ON</button>
        <button class="tog on" id="sound-off" onclick="setSoundPref(false)">OFF</button>
      </div>
    </div>

    <div class="sleep-notice">
      <p>📵 <strong>画面スリープを防ぐには：</strong><br>
      設定 → 画面表示と明るさ → 自動ロック → <strong>「なし」</strong> に変更してください。</p>
    </div>

    <button class="start-btn" onclick="startTimer()">集中スタート</button>
  </div>

  <!-- TIMER -->
  <div class="screen hidden" id="timer">
    <div class="task-display" id="task-display"></div>
    <div class="phase-label" id="phase-label">集中中</div>
    <div class="ring-container">
      <svg id="ring-svg" width="240" height="240" viewBox="0 0 240 240">
        <circle id="ring-track" cx="120" cy="120" r="110"/>
        <circle id="ring-fill" cx="120" cy="120" r="110"/>
      </svg>
      <div class="ring-center">
        <div id="display-time">25:00</div>
        <div id="overtime-label"></div>
      </div>
    </div>
    <div class="interval-dots" id="interval-dots"></div>
    <div class="controls">
      <button class="ctrl" id="pause-btn" onclick="togglePause()">一時停止</button>
      <button class="ctrl stop" onclick="stopTimer()">やめる</button>
    </div>
    <div class="vis-status">
      <div class="dot" id="dot"></div>
      <span id="vis-text">画面を表示中 — タイマー動作中</span>
    </div>
  </div>

  <!-- DONE -->
  <div class="screen hidden" id="done">
    <div class="done-icon" id="done-icon">✦</div>
    <div class="done-stars" id="done-stars"></div>
    <div class="done-title">お疲れさまでした！</div>
    <div class="done-task" id="done-task"></div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-elapsed" id="done-elapsed"></div>
    <div class="done-btns">
      <button class="btn-again" onclick="resetSame()">もう一度</button>
      <button class="btn-change" onclick="resetNew()">変える</button>
    </div>
  </div>

</div>

<script>
// リング半径110 → 周長 2π×110 ≈ 691
const CIRC = 2 * Math.PI * 110;
document.getElementById('ring-fill').style.strokeDasharray = CIRC;

let total=0, remaining=0, running=false, paused=false;
let startedAt=0, pausedAt=0, totalPaused=0, ticker=null;
let lastH=0, lastM=25, lastS=0, lastTask='';
let intervalSecs=600, intervalCount=0, totalIntervals=0;
let lastWarned20=false, soundOn=false;
let audioCtx=null;
let chikaTimer=null, chikaCountdown=0;

// ── localStorage ──
const LS_TASKS = 'focus_timer_tasks_v2';
const DEFAULT_TASKS = ['メール返信','資料作成','リサーチ','社内MTG準備','読書','タスク整理'];

function loadQuickTasks() {
  try { const s=localStorage.getItem(LS_TASKS); return s?JSON.parse(s):DEFAULT_TASKS; }
  catch(e) { return DEFAULT_TASKS; }
}
function saveQuickTasks() {
  const tasks = document.getElementById('qtask-textarea').value
    .split('\n').map(t=>t.trim()).filter(t=>t.length>0);
  try { localStorage.setItem(LS_TASKS,JSON.stringify(tasks)); } catch(e) {}
  renderQuickTasks(tasks);
  document.getElementById('qtask-editor').classList.remove('open');
}
function renderQuickTasks(tasks) {
  const row = document.getElementById('quick-tasks-row');
  row.innerHTML = '';
  tasks.forEach(t=>{
    const b=document.createElement('button');
    b.className='qtask'; b.textContent=t; b.onclick=()=>setTask(t);
    row.appendChild(b);
  });
  document.getElementById('qtask-textarea').value=tasks.join('\n');
}
function toggleEditor() {
  document.getElementById('qtask-editor').classList.toggle('open');
}

// ── 音設定（デフォルトOFF）──
function setSoundPref(on) {
  soundOn = on;
  document.getElementById('sound-on').className  = 'tog' + (on  ? ' on' : '');
  document.getElementById('sound-off').className = 'tog' + (!on ? ' on' : '');
}

// ── Audio ──
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq,dur,vol) {
  if (!soundOn) return;
  try {
    const ctx=getAudio(), osc=ctx.createOscillator(), gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=freq; osc.type='sine';
    gain.gain.setValueAtTime(vol||0.25,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function beepStart()    { beep(520,0.12,0.22); setTimeout(()=>beep(660,0.15,0.22),130); }
function beepInterval() { beep(440,0.1,0.2);   setTimeout(()=>beep(440,0.1,0.2),220); }
function beepWarning()  { beep(380,0.18,0.28); setTimeout(()=>beep(350,0.22,0.22),210); }
function beepDone()     { beep(523,0.15,0.28); setTimeout(()=>beep(659,0.15,0.28),180); setTimeout(()=>beep(784,0.3,0.28),360); }

function setTask(n) { document.getElementById('task-input').value=n; }
function setTime(h,m,s) {
  document.getElementById('inp-h').value=h;
  document.getElementById('inp-m').value=m;
  document.getElementById('inp-s').value=s;
}
function getSecs() {
  return (+document.getElementById('inp-h').value||0)*3600
       + (+document.getElementById('inp-m').value||0)*60
       + (+document.getElementById('inp-s').value||0);
}
function fmt(secs) {
  const a=Math.abs(secs), h=Math.floor(a/3600), m=Math.floor((a%3600)/60), s=a%60;
  return (secs<0?'-':'')+(h>0?h+':'+p(m)+':'+p(s):p(m)+':'+p(s));
}
function fmtMin(secs) {
  const m=Math.floor(Math.abs(secs)/60);
  return m+'分';
}
function p(n) { return String(n).padStart(2,'0'); }

// ── タイマー開始 ──
function startTimer() {
  total=getSecs(); if(total<=0) return;
  try { getAudio().resume(); } catch(e) {}
  lastH=+document.getElementById('inp-h').value||0;
  lastM=+document.getElementById('inp-m').value||0;
  lastS=+document.getElementById('inp-s').value||0;
  lastTask=document.getElementById('task-input').value.trim();
  intervalSecs=+document.getElementById('interval-select').value;
  remaining=total; paused=false; running=true;
  startedAt=Date.now(); totalPaused=0; intervalCount=0; lastWarned20=false;
  totalIntervals=intervalSecs>0?Math.floor(total/intervalSecs):0;
  document.getElementById('task-display').textContent=lastTask||'';
  buildDots(); show('timer'); render();
  beepStart();
  ticker=setInterval(tick,250);
}

function buildDots() {
  const row=document.getElementById('interval-dots'); row.innerHTML='';
  if(totalIntervals<=0||totalIntervals>12) return;
  for(let i=0;i<totalIntervals;i++){
    const d=document.createElement('div');
    d.className='idot'; d.id='idot-'+i; row.appendChild(d);
  }
}
function updateDots(elapsed) {
  if(totalIntervals<=0) return;
  const cur=Math.floor(elapsed/intervalSecs);
  for(let i=0;i<totalIntervals;i++){
    const d=document.getElementById('idot-'+i); if(!d) continue;
    d.className='idot'+(i<cur?' passed':i===cur?' current':'');
  }
}

function tick() {
  if(paused||!running) return;
  const elapsed=Math.floor((Date.now()-startedAt-totalPaused)/1000);
  remaining=total-elapsed;

  // インターバル
  if(intervalSecs>0&&elapsed>0){
    const iIdx=Math.floor(elapsed/intervalSecs);
    if(iIdx>intervalCount&&iIdx<=totalIntervals){
      intervalCount=iIdx;
      triggerChika(iIdx*intervalSecs);
    }
  }

  updateDots(elapsed);

  // 残り20%警告（音のみ）
  if(remaining/total<=0.2&&remaining>0&&!lastWarned20){
    lastWarned20=true; beepWarning();
  }

  render();

  if(remaining<=0&&running){
    running=false; clearInterval(ticker);
    beepDone();
    setTimeout(showDone,400);
  }
}

// ── チカチカ演出 ──
const TEAL  = '#00bfa5';
const WHITE = '#ffffff';
const TEAL_TEXT  = '#004d40';
const WHITE_TEXT = '#00796b';

function triggerChika(elapsedSecs) {
  beepInterval();
  const elapsedLabel = fmtMin(elapsedSecs);
  document.getElementById('chika-elapsed').textContent = elapsedLabel;
  document.getElementById('chika-task').textContent = lastTask ? '「'+lastTask+'」に集中中' : '';

  const el = document.getElementById('chika');
  el.classList.add('active');

  // 2秒間チカチカ（ターコイズ↔白を4回）
  let phase=0;
  const totalFlashes=8, flashInterval=250;
  const flicker = setInterval(()=>{
    phase++;
    if(phase%2===0){
      applyChikaTheme(WHITE, WHITE_TEXT);
    } else {
      applyChikaTheme(TEAL, TEAL_TEXT);
    }
    if(phase>=totalFlashes) {
      clearInterval(flicker);
      // チカチカ終了後はターコイズで安定表示
      applyChikaTheme(TEAL, TEAL_TEXT);
      startChikaCountdown();
    }
  }, flashInterval);

  // 初期色
  applyChikaTheme(TEAL, TEAL_TEXT);
}

function applyChikaTheme(bg, textColor) {
  const el = document.getElementById('chika');
  el.style.background = bg;
  el.querySelector('.chika-elapsed').style.color = textColor;
  el.querySelector('.chika-label').style.color = textColor;
  el.querySelector('.chika-task').style.color = 'rgba('+hexToRgb(textColor)+',0.7)';
  el.querySelector('.chika-countdown').style.color = 'rgba('+hexToRgb(textColor)+',0.55)';
  const btn = el.querySelector('.chika-dismiss');
  btn.style.background = textColor;
  btn.style.color = bg;
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function startChikaCountdown() {
  chikaCountdown=5;
  document.getElementById('chika-countdown').textContent=chikaCountdown+'秒後に閉じます';
  chikaTimer=setInterval(()=>{
    chikaCountdown--;
    const el=document.getElementById('chika-countdown');
    if(el) el.textContent=chikaCountdown+'秒後に閉じます';
    if(chikaCountdown<=0) dismissChika();
  },1000);
}

function dismissChika() {
  clearInterval(chikaTimer);
  document.getElementById('chika').classList.remove('active');
}

function togglePause() {
  paused=!paused;
  if(paused){ pausedAt=Date.now(); document.getElementById('pause-btn').textContent='再開'; }
  else { totalPaused+=Date.now()-pausedAt; document.getElementById('pause-btn').textContent='一時停止'; }
  render();
}

function stopTimer() {
  clearInterval(ticker); running=false; paused=false; lastWarned20=false;
  dismissChika();
  show('setup'); document.getElementById('app').className='';
}

function render() {
  const rem=Math.max(remaining,0), ratio=total>0?rem/total:0;
  const fill=document.getElementById('ring-fill');
  const timeEl=document.getElementById('display-time');
  const phaseEl=document.getElementById('phase-label');
  const overtimeEl=document.getElementById('overtime-label');
  const app=document.getElementById('app');
  const dot=document.getElementById('dot');
  const visText=document.getElementById('vis-text');

  fill.style.strokeDashoffset=CIRC*(1-ratio);

  if(remaining<0){
    app.className='danger'; fill.style.stroke='#c95555'; timeEl.style.color='#c95555';
    timeEl.textContent='00:00'; overtimeEl.textContent='+'+fmt(-remaining)+' オーバー';
    phaseEl.textContent='時間オーバー'; phaseEl.style.color='#c95555';
    fill.style.strokeDashoffset=CIRC*0.98;
  } else if(ratio<=0.2){
    app.className='danger'; fill.style.stroke='#c95555'; timeEl.style.color='#c95555';
    timeEl.textContent=fmt(rem); overtimeEl.textContent='';
    phaseEl.textContent='残りわずか！'; phaseEl.style.color='#c95555';
  } else if(ratio<=0.5){
    app.className='warn'; fill.style.stroke='#d4954a'; timeEl.style.color='#d4954a';
    timeEl.textContent=fmt(rem); overtimeEl.textContent='';
    phaseEl.textContent='もうひと踏ん張り'; phaseEl.style.color='#d4954a';
  } else {
    app.className=''; fill.style.stroke='#f0ede8'; timeEl.style.color='#f0ede8';
    timeEl.textContent=fmt(rem); overtimeEl.textContent='';
    phaseEl.textContent=paused?'一時停止中':'集中中'; phaseEl.style.color='rgba(240,237,232,0.4)';
  }

  if(document.hidden){ dot.className='dot off'; visText.textContent='画面が非表示 — 一時停止中'; }
  else if(paused){ dot.className='dot off'; visText.textContent='一時停止中'; }
  else{ dot.className='dot'; visText.textContent='画面を表示中 — タイマー動作中'; }
}

function showDone() {
  show('done'); document.getElementById('app').className='done-phase';
  const actual=Math.floor((Date.now()-startedAt-totalPaused)/1000);
  const over=actual-total;
  document.getElementById('done-elapsed').textContent='所要時間: '+fmt(actual);
  document.getElementById('done-task').textContent=lastTask?'「'+lastTask+'」':'';
  const sub=document.getElementById('done-sub'), icon=document.getElementById('done-icon');
  let stars=3;
  if(over<=30){sub.textContent='見事！時間どおりに完了しました';icon.textContent='✦';stars=3;}
  else if(over<=120){sub.textContent='ほぼ時間内！次回はさらに締めて';icon.textContent='◎';stars=2;}
  else{sub.textContent='もう少しコンパクトにいきましょう';icon.textContent='○';stars=1;}
  renderStars(stars); launchConfetti();
}

function renderStars(n) {
  const row=document.getElementById('done-stars'); row.innerHTML='';
  for(let i=0;i<3;i++){
    const c=i<n?'#d4954a':'rgba(240,237,232,0.15)';
    row.innerHTML+=`<svg width="28" height="28" viewBox="0 0 24 24" style="animation-delay:${0.08+i*0.13}s"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${c}" stroke="${c}" stroke-width="0.5"/></svg>`;
  }
}

function launchConfetti() {
  const canvas=document.getElementById('confetti'), ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const cols=['#00bfa5','#7f77dd','#d4954a','#c95555','#5a9e7a','#d4537e'];
  const pieces=Array.from({length:90},()=>({
    x:Math.random()*canvas.width, y:-20-Math.random()*200,
    w:5+Math.random()*7, h:9+Math.random()*5,
    c:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*Math.PI*2, vx:(Math.random()-0.5)*3.5,
    vy:2.5+Math.random()*4, vr:(Math.random()-0.5)*0.18, a:1
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      if(f>55) p.a=Math.max(0,p.a-0.018);
      ctx.save(); ctx.globalAlpha=p.a;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    f++; if(f<130) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

function show(id) {
  ['setup','timer','done'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));
}
function resetSame() {
  setTime(lastH,lastM,lastS); document.getElementById('task-input').value=lastTask;
  lastWarned20=false; show('setup'); document.getElementById('app').className='';
}
function resetNew() {
  lastWarned20=false; show('setup'); document.getElementById('app').className='';
}

document.addEventListener('visibilitychange',()=>{
  if(!running) return;
  if(document.hidden){
    if(!paused){ paused=true; pausedAt=Date.now(); document.getElementById('pause-btn').textContent='再開'; }
  } else {
    if(paused&&pausedAt){ totalPaused+=Date.now()-pausedAt; pausedAt=0; paused=false; document.getElementById('pause-btn').textContent='一時停止'; }
    render();
  }
});

['inp-h','inp-m','inp-s'].forEach(id=>{
  document.getElementById(id).addEventListener('change',function(){
    this.value=Math.max(0,Math.min(id==='inp-h'?23:59,+this.value||0));
  });
});

renderQuickTasks(loadQuickTasks());
</script>
